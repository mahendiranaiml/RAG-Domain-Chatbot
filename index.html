<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI RAG Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #a78bfa, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .chat-container {
            width: 100%;
            max-width: 720px;
            height: 75vh;
            background: #111111;
            border: 1px solid #222;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.08);
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .welcome-text {
            color: #555;
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #d0d0d0;
            border-bottom-left-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #1e1e1e;
            background: #0f0f0f;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input-area input::placeholder {
            color: #555;
        }

        .chat-input-area input:focus {
            border-color: #6366f1;
        }

        .chat-input-area button {
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }

        .chat-input-area button:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
        }

        .chat-input-area button:active {
            transform: scale(0.97);
        }

        .chat-input-area button:disabled,
        .chat-input-area input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .message.typing {
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>RAG Domain Chatbot</h1>

    <div class="chat-container" id="chatContainer">
        <div class="chat-messages" id="chatMessages">
            <p class="welcome-text">Ask questions from the indexed document.</p>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your question here..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>
<script>
    const chatMessages = document.getElementById("chatMessages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    async function readJson(response) {
        try {
            return await response.json();
        } catch {
            return { message: response.statusText || "Server returned an invalid response" };
        }
    }

    function addMessage(text, sender, extraClass = "") {
        const welcomeText = chatMessages.querySelector(".welcome-text");
        if (welcomeText) welcomeText.remove();

        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender} ${extraClass}`.trim();
        msgDiv.textContent = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return msgDiv;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage(message, "user");
        userInput.value = "";
        userInput.disabled = sendBtn.disabled = true;

        const typingMsg = addMessage("Thinking...", "bot", "typing");

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await readJson(response);
            if (!response.ok) throw new Error(data.message || "Something went wrong");

            typingMsg.remove();
            addMessage(data.answer || "No answer received.", "bot");
        } catch (error) {
            typingMsg.remove();
            addMessage("Error: " + error.message, "bot");
        } finally {
            userInput.disabled = sendBtn.disabled = false;
            userInput.focus();
        }
    }

    userInput.addEventListener("keydown", e => e.key === "Enter" && !sendBtn.disabled && sendMessage());
</script>

</body>
</html>
